openapi: 3.0.3
info:
  title: Support Ticket API
  version: 1.0.0
  description: A REST API for support tickets, comments, categories, and user authentication.

servers:
  - url: /

tags:
  - name: Auth
  - name: Categories
  - name: Tickets
  - name: Comments

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: user1@example.com
        password:
          type: string
          example: Password123
        role:
          type: string
          enum: [USER, SUPPORT]
          example: USER

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: user1@example.com
        password:
          type: string
          example: Password123

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: jwt_token_here

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: user1@example.com
        role:
          type: string
          example: USER

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Login Issues

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Login Issues

    UpdateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Account Issues

    Ticket:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Cannot log in
        description:
          type: string
          example: My password is not working.
        status:
          type: string
          enum: [PENDING, COMPLETED]
          example: PENDING
        userId:
          type: integer
          example: 1
        categoryId:
          type: integer
          example: 1

    CreateTicketRequest:
      type: object
      required:
        - title
        - description
        - categoryId
      properties:
        title:
          type: string
          example: Cannot log in
        description:
          type: string
          example: My password is not working.
        categoryId:
          type: integer
          example: 1

    UpdateTicketRequest:
      type: object
      properties:
        title:
          type: string
          example: Cannot log in still
        description:
          type: string
          example: The password reset did not work.
        categoryId:
          type: integer
          example: 1
        status:
          type: string
          enum: [PENDING, COMPLETED]
          example: COMPLETED

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        message:
          type: string
          example: I am still having this issue.
        ticketId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1

    CreateCommentRequest:
      type: object
      required:
        - message
        - ticketId
      properties:
        message:
          type: string
          example: I am still having this issue.
        ticketId:
          type: integer
          example: 1

    UpdateCommentRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: I am still having this issue after restarting.

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

paths:
  /api/auth/signup:
    post:
      tags:
        - Auth
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '409':
          description: Email already in use

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in and receive a JWT access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request
        '401':
          description: Invalid credentials

  /api/categories:
    post:
      tags:
        - Categories
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Category already exists

    get:
      tags:
        - Categories
      summary: Get all categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized

  /api/categories/{id}:
    get:
      tags:
        - Categories
      summary: Get one category by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Category returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Category not found

    put:
      tags:
        - Categories
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Category not found
        '409':
          description: Category already exists

    delete:
      tags:
        - Categories
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Category deleted
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Category not found

  /api/tickets:
    post:
      tags:
        - Tickets
      summary: Create a ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Category not found

    get:
      tags:
        - Tickets
      summary: Get tickets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tickets returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        '401':
          description: Unauthorized

  /api/tickets/{id}:
    get:
      tags:
        - Tickets
      summary: Get one ticket by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Ticket returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ticket not found

    put:
      tags:
        - Tickets
      summary: Update a ticket
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketRequest'
      responses:
        '200':
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ticket not found

    delete:
      tags:
        - Tickets
      summary: Delete a ticket
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Ticket deleted
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ticket not found

  /api/comments:
    post:
      tags:
        - Comments
      summary: Create a comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ticket not found

    get:
      tags:
        - Comments
      summary: Get comments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Comments returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '401':
          description: Unauthorized

  /api/comments/{id}:
    get:
      tags:
        - Comments
      summary: Get one comment by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Comment returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Comment not found

    put:
      tags:
        - Comments
      summary: Update a comment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Comment not found

    delete:
      tags:
        - Comments
      summary: Delete a comment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Comment deleted
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Comment not found